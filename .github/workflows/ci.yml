name: LLMOps Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    name: Lint & Validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install mlflow requests flake8 pyyaml

    - name: Lint Python files
      run: |
        flake8 mlflow/ tests/ --ignore=E302,E303,E305,E128,E501,W503

    - name: Validate Kubernetes manifests
      run: |
        for f in k8s/*.yaml; do
          python -c "
import yaml
with open('$f') as fh:
    docs = list(yaml.safe_load_all(fh))
    print('✅ Valid:', '$f', '(' + str(len(docs)) + ' docs)')
"
        done

    - name: Check all required files exist
      run: |
        test -f docker-compose.yml            && echo "✅ docker-compose.yml"
        test -f observability/prometheus.yml  && echo "✅ prometheus.yml"
        test -f gateway/pom.xml               && echo "✅ gateway/pom.xml"
        test -f mlflow/mlflow-tracking.py     && echo "✅ mlflow-tracking.py"
        test -f tests/ab-test.py              && echo "✅ ab-test.py"
        echo "✅ All checks passed!"
