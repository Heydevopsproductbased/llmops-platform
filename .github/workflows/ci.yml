name: LLMOps Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    name: Lint & Validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install flake8 pyyaml

    - name: Lint Python files
      run: |
        flake8 mlflow/ tests/ --ignore=E302,E303,E305,E128,E501,W503

    - name: Validate Kubernetes manifests
      run: |
        python - << 'PYEOF'
        import yaml, glob, sys
        for f in glob.glob('k8s/*.yaml'):
            with open(f) as fh:
                docs = list(yaml.safe_load_all(fh))
            print(f"✅ {f} valid ({len(docs)} docs)")
        PYEOF

    - name: Check all required files exist
      run: |
        test -f docker-compose.yml            && echo "✅ docker-compose.yml"
        test -f observability/prometheus.yml  && echo "✅ prometheus.yml"
        test -f gateway/pom.xml               && echo "✅ gateway/pom.xml"
        test -f mlflow/mlflow-tracking.py     && echo "✅ mlflow-tracking.py"
        test -f tests/ab-test.py              && echo "✅ ab-test.py"
        echo "✅ All checks passed!"
